---
# End-to-end backup/restore test — thin wrapper around the role orchestration.
#
# Logic lives in roles/cifmw_backup_restore/tasks/e2e_test.yml; defaults in
# roles/cifmw_backup_restore/defaults/main.yml.
#
# Used standalone or triggered from post-deployment.yml (gated by
# cifmw_run_backup_restore_test).
#
# Examples:
#   ansible-playbook ... playbooks/backup_restore.yaml
#   ansible-playbook ... playbooks/backup_restore.yaml -e cifmw_backup_restore_run_restore=false
#
# Prerequisites:
# - OpenStack control plane deployed and healthy
# - OpenStackBackupConfig CR created (for backup labeling)
# - For manual testing on a reproducer, run post_deployment.sh first:
#     ./post_deployment.sh -e zuul_log_collection=true \
#       -e cifmw_nolog=false -e cifmw_run_tests=false

- name: Backup and Restore end-to-end test
  hosts: "{{ cifmw_target_host | default('localhost') }}"
  gather_facts: true

  tasks:
    - name: Run backup/restore end-to-end orchestration
      ansible.builtin.import_role:
        name: cifmw_backup_restore
        tasks_from: e2e_test.yml
