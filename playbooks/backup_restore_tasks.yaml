---
# Backup and Restore task list
#
# Shared by:
# - playbooks/backup_restore.yaml (standalone usage)
# - post-deployment.yml (pipeline usage, gated by cifmw_run_backup_restore_test)

- name: Run pre_backup_restore hooks
  vars:
    step: pre_backup_restore
  ansible.builtin.import_role:
    name: run_hook

# ========================================
# Step 1: Install dependencies
# ========================================
- name: Setup MinIO
  ansible.builtin.include_role:
    name: deploy_minio
  when: cifmw_backup_restore_install_deps | default(true) | bool

- name: Setup OADP
  ansible.builtin.include_role:
    name: openshift_adp
  vars:
    cifmw_openshift_adp_s3_access_key: "{{ cifmw_deploy_minio_access_key }}"
    cifmw_openshift_adp_s3_secret_key: "{{ cifmw_deploy_minio_secret_key }}"
  when: cifmw_backup_restore_install_deps | default(true) | bool

# ========================================
# Step 2: Create test workload
# ========================================
- name: Create test workload
  when: cifmw_backup_restore_create_workload | default(false) | bool
  block:
    - name: Generate workload launch script
      ansible.builtin.include_role:
        name: update
        tasks_from: create_test_files.yml

    - name: Create local openstackclient container
      ansible.builtin.include_role:
        name: update
        tasks_from: create_local_openstackclient.yml

    - name: Create the workload instance
      ansible.builtin.include_role:
        name: update
        tasks_from: create_instance.yml

# ========================================
# Step 3: Create backup
# ========================================
- name: Create backup
  ansible.builtin.include_role:
    name: cifmw_backup_restore
  vars:
    cifmw_backup_restore_action: backup
    cifmw_backup_restore_auto_ack: true
  when: cifmw_backup_restore_run_backup | default(true) | bool

- name: Print backup timestamp
  ansible.builtin.debug:
    msg: "Backup completed with timestamp: {{ cifmw_backup_restore_backup_name_suffix }}"
  when: cifmw_backup_restore_run_backup | default(true) | bool

# ========================================
# Step 4: Cleanup namespace
# ========================================
- name: Cleanup
  ansible.builtin.include_role:
    name: cifmw_backup_restore
  vars:
    cifmw_backup_restore_action: cleanup
    cifmw_backup_restore_auto_ack: true
  when: cifmw_backup_restore_run_cleanup | default(true) | bool

# ========================================
# Step 5: Restore from backup
# ========================================
- name: Restore
  ansible.builtin.include_role:
    name: cifmw_backup_restore
  vars:
    cifmw_backup_restore_action: restore
    cifmw_backup_restore_backup_timestamp: "{{ cifmw_backup_restore_backup_name_suffix }}"
    cifmw_backup_restore_auto_ack: true
  when: cifmw_backup_restore_run_restore | default(true) | bool

# ========================================
# Step 6: Post-restore tempest validation
# ========================================
- name: Run post-restore tempest validation
  ansible.builtin.include_role:
    name: "{{ cifmw_run_test_role | default('test_operator') }}"
  when: cifmw_backup_restore_run_post_tempest | default(false) | bool

- name: Run post_backup_restore hooks
  vars:
    step: post_backup_restore
  ansible.builtin.import_role:
    name: run_hook
